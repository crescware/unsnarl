[tools]
node = "24.15.0"
pnpm = "10"
rust = "1.95.0"
deno = "2"

# Helper-script convention
# -----------------------
# Multi-line helpers live under `scripts/` and are written as Deno
# TypeScript modules (`scripts/<name>.ts`), not shell scripts. Each
# task's `run` line invokes them via
# `deno run --allow-... scripts/<name>.ts` so the permission surface
# is explicit in `mise.toml` and the script body itself stays a pure
# `.ts` source file -- typecheckable, importable, and free of
# shell-quoting quirks. The repo-root resolution is uniform across
# scripts: every script derives the root from
# `new URL(import.meta.url).pathname` and slices off the trailing
# `scripts/<name>.ts`. New mise tasks that need more than a single
# command should add a new `scripts/<name>.ts` rather than inline a
# heredoc here, and should not introduce a fresh root-level `.sh`.

[tasks."check"]
description = "Run the canonical verification EXACTLY ONCE and summarize it. Steps: cargo fmt --all -> cargo clippy --workspace --all-targets --verbose -- -D warnings -> a SINGLE workspace test run (cargo test --workspace --no-fail-fast --verbose), whose combined output is split back into per-crate logs (no-allow-dead-code is just one ordinary member -- no special casing). The single run resolves features once so each crate compiles only once, instead of the old per-member `cargo test -p <member>` loop that kept recompiling the shared crates. Each step writes a SEPARATE full log under target/check/ (git-ignored), and the test run additionally yields one log per crate -- so a failure points at the crate that owns it -- and a compact summary (per-step PASS/FAIL, per-crate test passed/failed counts, failing test names) is printed. Read this instead of running cargo fmt/clippy/test by hand, and on failure read the saved per-crate log under target/check/ rather than re-running. Use it both day-to-day and before committing / opening a PR."
run = "deno run --allow-read --allow-write --allow-run --allow-env scripts/check.ts"

[tasks."check:no-allow-dead-code"]
description = "Run the `no-allow-dead-code` crate's tests: the workspace-wide dead-code-suppression scan plus the scanner's own unit tests (`cargo test -p no-allow-dead-code`). `mise run check` covers this crate by testing it as one of the workspace members (not by invoking this task); run this standalone to check just the dead-code policy (see docs/dead-code-policy.md)."
run = "cargo test -p no-allow-dead-code"

[tasks."tidy:scripts"]
description = "Format and type-check every Deno helper script under scripts/. Runs `deno fmt scripts/*.ts` (applies formatting in place) then `deno check scripts/*.ts` (type-checks each); the glob follows the flat scripts/<name>.ts convention. This is the Deno-side counterpart to `check`, which covers only the Rust workspace. Run it after editing any scripts/*.ts."
run = "deno fmt scripts/*.ts && deno check scripts/*.ts"

[tasks."build"]
description = "Build the `uns` CLI binary in release mode. Output: target/release/uns."
run = "cargo build --release -p unsnarl"

[tasks."npm:build-darwin-arm64"]
description = "Build the aarch64-apple-darwin release of `uns` and stage it into npm/unsnarl-darwin-arm64/bin/uns (gitignored). Triggered automatically by the `prepack` hook during `npm publish`. Installs the `aarch64-apple-darwin` rustup target on first run (idempotent)."
run = "rustup target add aarch64-apple-darwin && cargo build --release --target aarch64-apple-darwin -p unsnarl && mkdir -p npm/unsnarl-darwin-arm64/bin && cp target/aarch64-apple-darwin/release/uns npm/unsnarl-darwin-arm64/bin/uns && chmod +x npm/unsnarl-darwin-arm64/bin/uns"

[tasks."npm:publish"]
description = "Publish unsnarl-darwin-arm64 then unsnarl to npm. Each package's dist-tag is taken from its own publishConfig.tag and passed via --tag (npm 11.12.x silently ignores publishConfig.tag otherwise). Pass `-- --dry-run` to dry-run both publishes, or use the `npm:publish:dry-run` task."
run = "deno run --allow-read --allow-run scripts/npm-publish.ts"

[tasks."npm:publish:dry-run"]
description = "Shortcut for `mise run npm:publish -- --dry-run`. Runs both publishes in dry-run mode; nothing is actually pushed to npm."
run = "deno run --allow-read --allow-run scripts/npm-publish.ts --dry-run"

[tasks."release"]
description = "Run the post-merge release sequence as one command so the GitHub Release can never be skipped: check out main + `git pull --ff-only origin main` -> dry-run publish (gate on exit code only) -> guard that we are on a clean main in sync with origin/main -> `git tag vX.Y.Z` on main's merge commit + push -> real npm:publish -> `gh release create vX.Y.Z --generate-notes --verify-tag` (plus `--prerelease` for a pre-release version). Does NOT bump or merge the bump PR; run it after the bump PR is merged -- it is fine to run from the `release-x.y.z` branch since the script checks out main and pulls itself. If the Release already exists it exits 0 without touching anything. npm-publish.ts is invoked as a subprocess with inherited stdio so npm's passkey browser flow keeps working."
run = "deno run --allow-read --allow-run scripts/release.ts"

[tasks."prepare-release"]
description = "Bump the version and open the release PR in one no-look command (pairs with `release`, which handles the post-merge tag/publish/GitHub Release; neither is a child of the other). Must run on a clean `main` in sync with origin/main: creates branch `release-<version>`, runs `bump`, then mechanically verifies the resulting diff is PURELY version/tag changes -- only the expected files changed, every version/publishConfig.tag field holds the new value, and every changed diff line carries the old/new version or old/new tag -- aborting otherwise since no human eyeballs it. Then commits `Bump <old> -> <version>`, pushes, and opens the PR. Works for any version (stable or pre-release), not just pre-releases. Does NOT run check and does NOT merge the PR. Pass `--dry-run` to rehearse without outward effects: it runs the SAME guards as a real run (clean main in sync with origin/main, gh authenticated) and the same bump + mechanical verify, then reverts the bump and prints what a real run would commit/push/open, creating no branch/commit/push/PR. Usage: `mise run prepare-release -- 0.4.0-beta.1` or `mise run prepare-release -- 0.4.0-beta.1 --dry-run`."
run = "deno run --allow-read --allow-run scripts/prepare-release.ts"

[tasks."bump"]
description = "Align every version field (Cargo.toml [workspace.package].version, package.json version + optionalDependencies.unsnarl-darwin-arm64, npm/unsnarl-darwin-arm64/package.json version) AND both publishConfig.tag fields (root + sub-package) to match the version passed as the argument, then regenerate Cargo.lock. The publishConfig.tag is derived from the semver pre-release id: no prerelease -> `latest`, `-rc.*` -> `rc`, anything else (e.g. `-beta.*`, `-alpha.*`) -> `beta`. Usage: `mise run bump -- 0.3.0-rc.2`. This is the only sanctioned way to set the project version; it does NOT auto-increment, it just aligns everything to the argument."
run = "deno run --allow-read --allow-write --allow-run scripts/bump-version.ts"

[tasks."parity"]
description = "Run the parity harness against integration/fixtures/**/expected.ir.json."
run = "cargo test --workspace --test parity"

[tasks."emit:ir"]
description = "Emit IR for the given input. Extra args are forwarded to `uns -f ir` (e.g. `mise run emit:ir -- path/to/file.ts`, or `mise run emit:ir -- --stdin --stdin-lang ts < file.ts`)."
depends = ["build"]
run = "./target/release/uns -f ir"

[tasks."bench:node-modules"]
description = "Run `uns` against every .js/.ts file under fixtures/bench/node_modules (d3, elkjs, mermaid) and rank by per-file wall-clock time. Auto-runs `pnpm install` on first use."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-node-modules.ts"

[tasks."regen:fixtures"]
description = "Regenerate every expected.* / preview.md baseline under integration/fixtures/ by running the Rust CLI (uns). After completion, `git diff` should be empty."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/regen-fixtures.ts"

[tasks."cov"]
description = "Build the workspace with `-Cinstrument-coverage`, run `cargo test --workspace`, and emit a per-file llvm-cov report under target/coverage/. Use `-- --filter <regex>` to filter report rows by filename, and forward any other args (e.g. `--test parity`, `-p unsnarl-analyzer`) verbatim to both the build and run phases of `cargo test --workspace` (e.g. `mise run cov -- --test parity`, `mise run cov -- --filter build_analysis_visitor.rs`). Requires `rustup component add llvm-tools-preview`."
run = "deno run --allow-read --allow-write --allow-run --allow-env scripts/cov.ts"
