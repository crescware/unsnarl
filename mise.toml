[tools]
node = "24.15.0"
rust = "1.95.0"
deno = "2"

# Helper-script convention
# -----------------------
# Multi-line helpers live under `scripts/` and are written as Deno
# TypeScript modules (`scripts/<name>.ts`), not shell scripts. Each
# task's `run` line invokes them via
# `deno run --allow-... scripts/<name>.ts` so the permission surface
# is explicit in `mise.toml` and the script body itself stays a pure
# `.ts` source file -- typecheckable, importable, and free of
# shell-quoting quirks. The repo-root resolution is uniform across
# scripts: every script derives the root from
# `new URL(import.meta.url).pathname` and slices off the trailing
# `scripts/<name>.ts`. New mise tasks that need more than a single
# command should add a new `scripts/<name>.ts` rather than inline a
# heredoc here, and should not introduce a fresh root-level `.sh`.

[tasks."check:no-allow-dead-code"]
description = "Fail if any `#[allow(dead_code)]` / `#[expect(dead_code)]` is present in the Rust source tree."
run = "cargo test -p no-allow-dead-code workspace_has_no_dead_code_suppression"

[tasks."build"]
description = "Build the `uns` CLI binary in release mode. Output: target/release/uns."
run = "cargo build --release -p unsnarl"

[tasks."npm:build-darwin-arm64"]
description = "Build the aarch64-apple-darwin release of `uns` and stage it into npm/unsnarl-darwin-arm64/bin/uns (gitignored). Triggered automatically by the `prepack` hook during `npm publish`."
run = "cargo build --release --target aarch64-apple-darwin -p unsnarl && mkdir -p npm/unsnarl-darwin-arm64/bin && cp target/aarch64-apple-darwin/release/uns npm/unsnarl-darwin-arm64/bin/uns && chmod +x npm/unsnarl-darwin-arm64/bin/uns"

[tasks."npm:publish"]
description = "Publish unsnarl-darwin-arm64 then unsnarl to npm. Each package's dist-tag is taken from its own publishConfig.tag and passed via --tag (npm 11.12.x silently ignores publishConfig.tag otherwise). Pass `-- --dry-run` to dry-run both publishes, or use the `npm:publish:dry-run` task."
run = "deno run --allow-read --allow-run scripts/npm-publish.ts"

[tasks."npm:publish:dry-run"]
description = "Shortcut for `mise run npm:publish -- --dry-run`. Runs both publishes in dry-run mode; nothing is actually pushed to npm."
run = "deno run --allow-read --allow-run scripts/npm-publish.ts --dry-run"

[tasks."bump"]
description = "Align every version field (Cargo.toml [workspace.package].version, package.json version + optionalDependencies.unsnarl-darwin-arm64, npm/unsnarl-darwin-arm64/package.json version) AND both publishConfig.tag fields (root + sub-package) to match the version passed as the argument, then regenerate Cargo.lock. The publishConfig.tag is derived from the semver pre-release id: no prerelease -> `latest`, `-rc.*` -> `rc`, anything else (e.g. `-beta.*`, `-alpha.*`) -> `beta`. Usage: `mise run bump -- 0.3.0-rc.2`. This is the only sanctioned way to set the project version; it does NOT auto-increment, it just aligns everything to the argument."
run = "deno run --allow-read --allow-write --allow-run scripts/bump-version.ts"

[tasks."parity"]
description = "Run the parity harness against ts/integration/fixtures/**/expected.ir.json (Step 12 baseline)."
run = "cargo test --workspace --test parity"

[tasks."emit:ir"]
description = "Emit IR for the given input. Extra args are forwarded to `uns -f ir` (e.g. `mise run emit:ir -- path/to/file.ts`, or `mise run emit:ir -- --stdin --stdin-lang ts < file.ts`)."
depends = ["build"]
run = "./target/release/uns -f ir"

[tasks."bench:ir-parity"]
description = "Run `-f ir` against every ts/src/**/*.ts(x), compare Rust vs TS byte-for-byte, and record per-file wall-clock timings under target/parity-bench-ir/."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity.ts ir"

[tasks."bench:json-parity"]
description = "Run `-f json` (visual-graph JSON) against every ts/src/**/*.ts(x), compare Rust vs TS byte-for-byte, and record per-file wall-clock timings under target/parity-bench-json/."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity.ts json"

[tasks."bench:mermaid-parity"]
description = "Run `-f mermaid` (CLI defaults: elk strategy + dark theme) against every ts/src/**/*.ts(x), compare Rust vs TS byte-for-byte, and record per-file wall-clock timings under target/parity-bench-mermaid/."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity.ts mermaid"

[tasks."bench:markdown-parity"]
description = "Run `-f markdown` (CLI defaults: elk strategy + dark theme; markdown wraps the same mermaid render) against every ts/src/**/*.ts(x), compare Rust vs TS byte-for-byte, and record per-file wall-clock timings under target/parity-bench-markdown/."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity.ts markdown"

[tasks."bench:stats-parity"]
description = "Run `-f stats` against every ts/src/**/*.ts(x), compare Rust vs TS byte-for-byte, and record per-file wall-clock timings under target/parity-bench-stats/."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity.ts stats"

[tasks."bench:variant-parity"]
description = "Single-shot CLI-variant parity sweep. Usage: `mise run bench:variant-parity -- <format> <variant>` (format = ir|json|mermaid|markdown|stats; variant = baseline|r-a-1|r-b-1|r-c-1|h-mid|depth-1). Output: target/parity-bench-<format>-<variant>/."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity.ts"

[tasks."bench:variant-parity-all"]
description = "Run the full 5-format x 6-variant matrix (30 sweeps) against ts/src/**/*.ts(x). Sweeps run sequentially; the aggregator never stops on failure. Exit 0 only when every sweep matched byte-for-byte."
depends = ["build"]
run = "deno run --allow-read --allow-write --allow-run scripts/bench-parity-all.ts"

[tasks."cov"]
description = "Build the workspace with `-Cinstrument-coverage`, run `cargo test --workspace`, and emit a per-file llvm-cov report under target/coverage/. Pass a filename regex as the first arg to filter rows (e.g. `mise run cov -- build_analysis_visitor.rs`). Requires `rustup component add llvm-tools-preview`."
run = "deno run --allow-read --allow-write --allow-run --allow-env scripts/cov.ts"
